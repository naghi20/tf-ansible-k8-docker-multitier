---
- name: Remove broken legacy kubernetes source lists if present
  file:
    path: /etc/apt/sources.list.d/kubernetes.list
    state: absent

- name: Create apt keyrings directory if missing
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Kubernetes apt GPG key
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644" 

- name: Remove any legacy/broken kubernetes apt sources
  shell: |
    rm -f /etc/apt/sources.list.d/kubernetes.list /etc/apt/sources.list.d/k8s.list
    sed -i '/k8s/d' /etc/apt/sources.list
  changed_when: false

- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
    state: present
    filename: kubernetes
    update_cache: yes

- name: Install kubelet, kubeadm, kubectl
  apt:
    name: [kubelet, kubeadm, kubectl]
    state: present
    update_cache: true

- name: Hold Kubernetes packages at current version
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: [kubelet, kubeadm, kubectl]
