---
- name: Check if node has already joined the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Copy the join command generated by the master
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/generated/kubeadm_join_command.sh"
    dest: /tmp/kubeadm_join_command.sh
    mode: "0755"
  when: not kubelet_conf.stat.exists

- name: Execute the join command with preflight overrides for low RAM/swap
  ansible.builtin.shell: sh /tmp/kubeadm_join_command.sh --ignore-preflight-errors=all
  when: not kubelet_conf.stat.exists
