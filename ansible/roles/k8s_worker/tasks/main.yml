---
- name: Check if node has already joined the cluster
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Copy the join command generated by the master
  copy:
    src: "{{ playbook_dir }}/generated/kubeadm_join_command.sh"
    dest: /tmp/kubeadm_join_command.sh
    mode: "0755"
  when: not kubelet_conf.stat.exists

- name: Execute the join command
  command: sh /tmp/kubeadm_join_command.sh
  when: not kubelet_conf.stat.exists
