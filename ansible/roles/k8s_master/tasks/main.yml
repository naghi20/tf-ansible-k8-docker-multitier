---
- name: Check if Kubernetes admin.conf exists
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Initialize the control plane with kubeadm (Flannel CIDR)
  ansible.builtin.command: >
    kubeadm init
    --apiserver-advertise-address={{ private_ip }}
    --pod-network-cidr=10.244.0.0/16
    --ignore-preflight-errors=all
  when: not kubeadm_admin_conf.stat.exists
  register: kubeadm_init

- name: Ensure .kube configuration directory exists for ubuntu
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy admin.conf to ubuntu home directory
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: yes
    owner: ubuntu
    group: ubuntu
    mode: '0600'
  when: kubeadm_init.changed or not kubeadm_admin_conf.stat.exists

- name: Install Flannel CNI (Lightweight pod networking)
  ansible.builtin.command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  become: true
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  when: kubeadm_init.changed or not kubeadm_admin_conf.stat.exists

- name: Remove control-plane taints to allow single node scheduling
  ansible.builtin.command: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
  become: true
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  ignore_errors: true
  when: kubeadm_init.changed or not kubeadm_admin_conf.stat.exists

- name: Dynamically generate a fresh kubeadm join command token
  ansible.builtin.command: kubeadm token create --print-join-command
  register: live_join_command
  changed_when: false

- name: Create local generated directory workspace on control server
  ansible.builtin.file:
    path: "{{ playbook_dir }}/generated"
    state: directory
    mode: '0755'
  delegate_to: localhost

- name: Save join token command to the local workspace
  ansible.builtin.copy:
    content: "{{ live_join_command.stdout }}\n"
    dest: "{{ playbook_dir }}/generated/kubeadm_join_command.sh"
    mode: '0755'
  delegate_to: localhost

- name: Fetch fresh active kubeconfig to local workspace
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/generated/kubeconfig"
    flat: yes
