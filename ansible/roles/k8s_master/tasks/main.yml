---
- name: Check if cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Initialize the control plane with kubeadm
  command: >
    kubeadm init
    --apiserver-advertise-address={{ private_ip }}
    --pod-network-cidr=192.168.0.0/16
  when: not kubeadm_admin_conf.stat.exists
  register: kubeadm_init

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy admin.conf to ubuntu user's kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Install Calico CNI (pod networking)
  become_user: ubuntu
  command: kubectl apply -f https://githubusercontent.com
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  when: not kubeadm_admin_conf.stat.exists

- name: Generate the kubeadm join command on the master
  command: kubeadm token create --print-join-command
  register: join_command_raw

- name: Save join command to a local file (fetched by control node)
  copy:
    content: "{{ join_command_raw.stdout }}"
    dest: /tmp/kubeadm_join_command.sh
    mode: "0644"

- name: Fetch join command to Ansible control node
  fetch:
    src: /tmp/kubeadm_join_command.sh
    dest: "{{ playbook_dir }}/generated/kubeadm_join_command.sh"
    flat: true

- name: Fetch admin.conf kubeconfig to Ansible control node (for local kubectl use)
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/generated/kubeconfig"
    flat: true
